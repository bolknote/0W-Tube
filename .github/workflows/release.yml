name: Build tagged release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.14"

      - name: Verify tag matches the application version
        shell: bash
        run: |
          app_version="$(sed -n "s/.*versionName '\([^']*\)'.*/\1/p" app/build.gradle)"
          test -n "$app_version"
          test "$app_version" = "$GITHUB_REF_NAME"

      - name: Restore release signing key
        shell: bash
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          test -n "$RELEASE_KEYSTORE_BASE64"
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/0w-tube-release.jks"

      - name: Build signed release and run lint
        env:
          RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/0w-tube-release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: gradle :app:assembleRelease :app:lintRelease --no-daemon

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk "dist/0W-Tube-${GITHUB_REF_NAME}.apk"
          cd dist
          sha256sum "0W-Tube-${GITHUB_REF_NAME}.apk" > "0W-Tube-${GITHUB_REF_NAME}.apk.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: 0W-Tube-${{ github.ref_name }}
          path: dist/
          if-no-files-found: error

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          dist/0W-Tube-${GITHUB_REF_NAME}.apk
          dist/0W-Tube-${GITHUB_REF_NAME}.apk.sha256
          --verify-tag
          --generate-notes
          --title "0W-Tube ${GITHUB_REF_NAME}"
